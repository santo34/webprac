<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live HTML, CSS, JS Code editor</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;padding:20px;background:#f4f4f4}
h1{margin-bottom:15px}
.container{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.editor{display:flex;flex-direction:column;gap:10px}
.monaco-box{height:180px;border:1px solid #ccc;border-radius:8px;overflow:hidden}
iframe{width:100%;height:600px;border:1px solid #ccc;border-radius:8px;background:#fff}
.console{margin-top:10px;background:#000;color:#0f0;height:120px;overflow:auto;padding:10px;border-radius:8px;font-family:monospace}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.controls{display:flex;gap:10px;margin-bottom:10px}
@media(max-width:768px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>Live Code Editor (HTML, CSS & JS)</h1>

<div class="controls">
<button onclick="clearSaved()">Clear Saved Code</button>
Facing Problem? Contact Developper <a href="https://www.facebook.com/tajim342"> Tajim Hossain </a>
</div>

<div class="container">
<div class="editor">
<label>HTML</label>
<div id="htmlEditor" class="monaco-box"></div>

<label>CSS</label>
<div id="cssEditor" class="monaco-box"></div>

<label>JavaScript</label>
<div id="jsEditor" class="monaco-box"></div>
</div>

<div>
<iframe id="output"></iframe>
<div id="consoleOutput" class="console"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

<script>
let htmlEditor, cssEditor, jsEditor;

require.config({
paths:{
vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs"
}
});

require(["vs/editor/editor.main"], function(){

htmlEditor = monaco.editor.create(document.getElementById("htmlEditor"),{
value: localStorage.getItem("html") || "<h1>Hello World</h1>",
language:"html",
theme:"vs-dark",
automaticLayout:true
});

cssEditor = monaco.editor.create(document.getElementById("cssEditor"),{
value: localStorage.getItem("css") || "h1{color:blue;text-align:center;}",
language:"css",
theme:"vs-dark",
automaticLayout:true
});

jsEditor = monaco.editor.create(document.getElementById("jsEditor"),{
value: localStorage.getItem("js") || 'console.log("Hello JS");',
language:"javascript",
theme:"vs-dark",
automaticLayout:true
});

htmlEditor.onDidChangeModelContent(updateLive);
cssEditor.onDidChangeModelContent(updateLive);
jsEditor.onDidChangeModelContent(updateLive);

runCode();
});

function saveCode(){
localStorage.setItem("html",htmlEditor.getValue());
localStorage.setItem("css",cssEditor.getValue());
localStorage.setItem("js",jsEditor.getValue());
}

function runCode(){
if(!htmlEditor) return;

saveCode();

document.getElementById("consoleOutput").innerHTML="";

const html = htmlEditor.getValue();
const css = cssEditor.getValue();
const js = jsEditor.getValue();

document.getElementById("output").srcdoc = `
<html>
<head><style>${css}</style></head>
<body>
${html}
<script>
const oldLog=console.log;
console.log=function(...args){
parent.postMessage({type:'log',message:args.join(' ')},'*');
oldLog.apply(console,args);
};

window.onerror=function(msg){
parent.postMessage({type:'error',message:msg},'*');
};

${js}
<\/script>
</body>
</html>`;
}

function updateLive(){
runCode();
}

window.addEventListener("message",(e)=>{
if(!e.data || !e.data.type) return;
const box=document.getElementById("consoleOutput");

if(e.data.type==="error"){
box.innerHTML += "<div style='color:red'>"+e.data.message+"</div>";
}else{
box.innerHTML += "<div>"+e.data.message+"</div>";
}
});

function clearSaved(){
localStorage.clear();
location.reload();
}
</script>

</body>
</html>
